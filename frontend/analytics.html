<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Intelligence | Amdox ERP Suite</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%236C5CE7'/><text x='50' y='68' font-size='50' font-weight='bold' text-anchor='middle' fill='white'>A</text></svg>">
</head>
<body>
    
    <div class="app-container" id="dashboard-page">
        <aside class="sidebar">
            <div class="sidebar-brand">

            <div class="brand-logo" style="display: flex; align-items: center; gap: 8px;">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="8" fill="url(#paint0_linear)"/>
                    <path d="M20 10L30 20L20 30L10 20L20 10Z" fill="white" fill-opacity="0.9"/>
                    <path d="M10 10L15 15" stroke="white" stroke-width="2"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FF512F"/>
                            <stop offset="1" stop-color="#F09819"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h2 style="font-family: 'Inter', sans-serif; font-weight: 800; font-size: 24px; letter-spacing: 1px; margin: 0; background: -webkit-linear-gradient(#FF512F, #F09819); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AMDOX</h2>
            </div>

</div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a></li>
                <li><a href="hr.html" class=""><span class="nav-icon">👥</span> HR & Payroll</a></li>
                <li><a href="finance.html" class=""><span class="nav-icon">💰</span> Finance</a></li>
                <li><a href="supply.html" class=""><span class="nav-icon">📦</span> Supply Chain</a></li>
                <li><a href="projects.html" class=""><span class="nav-icon">📊</span> Projects</a></li>
                <li><a href="forecast.html" class=""><span class="nav-icon">📈</span> AI Forecast</a></li>
                <li><a href="analytics.html" class="active"><span class="nav-icon">📉</span> Analytics</a></li>
            </ul>
        </aside>
        
        <main class="main-content">
            <nav class="dashboard-nav" aria-label="Main navigation">
                <div class="nav-user">
                    <span id="nav-user-name" class="text-muted" style="font-size: var(--font-sm);"></span>
                    <div id="nav-avatar" class="nav-avatar"></div>
                    <button id="logout-btn" class="btn-logout" aria-label="Sign out">Sign Out</button>
                </div>
            </nav>
            
            <div class="dashboard-content">

            <div class="stats-row">
                <div class="stat-card"><div class="stat-icon">💰</div><div><span class="stat-value" id="s-revenue">—</span><span class="stat-label">Total Revenue</span></div></div>
                <div class="stat-card"><div class="stat-icon">📉</div><div><span class="stat-value" id="s-expenses">—</span><span class="stat-label">Total Expenses</span></div></div>
                <div class="stat-card"><div class="stat-icon">👥</div><div><span class="stat-value" id="s-employees">—</span><span class="stat-label">Active Employees</span></div></div>
                <div class="stat-card"><div class="stat-icon">🚀</div><div><span class="stat-value" id="s-projects">—</span><span class="stat-label">Active Projects</span></div></div>
            </div>
            <div class="charts-grid">
                <div class="chart-card"><h3>Revenue vs Expenses (Monthly)</h3><div class="chart-container"><canvas id="chart-trends"></canvas></div></div>
                <div class="chart-card"><h3>Expense Breakdown</h3><div class="chart-container"><canvas id="chart-expenses"></canvas></div></div>
                <div class="chart-card"><h3>Revenue by Category</h3><div class="chart-container"><canvas id="chart-income"></canvas></div></div>
                <div class="chart-card"><h3>Net Income Trend</h3><div class="chart-container"><canvas id="chart-net"></canvas></div></div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script><script src="js/auth.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (!requireAuth()) return;
        const user = getStoredUser(); if (user) { document.getElementById('nav-user-name').textContent = user.full_name||user.email; document.getElementById('nav-avatar').textContent = getUserInitials(user.full_name); }
        const token = () => localStorage.getItem(APP_CONFIG.TOKEN_KEY);
        const api = (p) => fetch(`${APP_CONFIG.API_BASE}${p}`, { headers: { 'Authorization': `Bearer ${token()}` } }).then(r => r.json());
        const fmt = (n) => '₹' + Number(n).toLocaleString('en-IN');
        const chartDefaults = { color: '#8B8BA7', borderColor: 'rgba(255,255,255,0.05)' };
        Chart.defaults.color = chartDefaults.color;
        Chart.defaults.borderColor = chartDefaults.borderColor;

        const [overview, trends] = await Promise.all([api('/analytics/overview'), api('/analytics/trends')]);

        if (overview.success) {
            document.getElementById('s-revenue').textContent = fmt(overview.data.revenue);
            document.getElementById('s-expenses').textContent = fmt(overview.data.expenses);
            document.getElementById('s-employees').textContent = overview.data.employees;
            document.getElementById('s-projects').textContent = overview.data.activeProjects;
        }

        if (trends.success) {
            const months = [...new Set([...trends.data.monthlyIncome.map(d=>d.month), ...trends.data.monthlyExpenses.map(d=>d.month)])].sort();
            const incomeMap = Object.fromEntries(trends.data.monthlyIncome.map(d=>[d.month, d.total]));
            const expenseMap = Object.fromEntries(trends.data.monthlyExpenses.map(d=>[d.month, d.total]));

            new Chart(document.getElementById('chart-trends'), {
                type: 'bar', data: {
                    labels: months.map(m => { const [y,mo] = m.split('-'); return new Date(y, mo-1).toLocaleString('default',{month:'short',year:'2-digit'}); }),
                    datasets: [
                        { label: 'Revenue', data: months.map(m => incomeMap[m]||0), backgroundColor: 'rgba(81,207,102,0.6)', borderRadius: 6 },
                        { label: 'Expenses', data: months.map(m => expenseMap[m]||0), backgroundColor: 'rgba(255,107,107,0.6)', borderRadius: 6 }
                    ]
                }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' } }, x: { grid: { display: false } } } }
            });

            new Chart(document.getElementById('chart-net'), {
                type: 'line', data: {
                    labels: months.map(m => { const [y,mo] = m.split('-'); return new Date(y, mo-1).toLocaleString('default',{month:'short'}); }),
                    datasets: [{ label: 'Net Income', data: months.map(m => (incomeMap[m]||0) - (expenseMap[m]||0)), borderColor: '#6C5CE7', backgroundColor: 'rgba(108,92,231,0.1)', fill: true, tension: 0.4, pointBackgroundColor: '#6C5CE7', pointRadius: 5 }]
                }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.03)' } }, x: { grid: { display: false } } } }
            });
        }

        if (overview.success) {
            const colors = ['#6C5CE7','#00D2FF','#FF6B9D','#51CF66','#FFC107','#FF6B6B'];
            new Chart(document.getElementById('chart-expenses'), {
                type: 'doughnut', data: {
                    labels: overview.data.expenseBreakdown.map(d=>d.category),
                    datasets: [{ data: overview.data.expenseBreakdown.map(d=>d.total), backgroundColor: colors, borderWidth: 0, hoverOffset: 8 }]
                }, options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { padding: 15, usePointStyle: true } } } }
            });

            new Chart(document.getElementById('chart-income'), {
                type: 'doughnut', data: {
                    labels: overview.data.incomeBreakdown.map(d=>d.category),
                    datasets: [{ data: overview.data.incomeBreakdown.map(d=>d.total), backgroundColor: colors.slice().reverse(), borderWidth: 0, hoverOffset: 8 }]
                }, options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { padding: 15, usePointStyle: true } } } }
            });
        }

        document.getElementById('logout-btn').addEventListener('click', async () => { await AuthAPI.logout(); window.location.replace('login.html'); });
    });
    </script>
    </div>
        </main>
    </div>
</body>
</html>
