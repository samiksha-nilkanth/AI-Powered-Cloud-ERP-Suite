<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amdox ERP Suite Dashboard - AI-Powered Enterprise Resource Planning">
    <title>Dashboard | Amdox ERP Suite</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%236C5CE7'/><text x='50' y='68' font-size='50' font-weight='bold' text-anchor='middle' fill='white'>A</text></svg>">
</head>
<body>
    <div class="dashboard-page" id="dashboard-page">
        
        <nav class="dashboard-nav" aria-label="Main navigation">
            <div class="nav-brand">
                <div class="logo-icon" aria-hidden="true">A</div>
                <h2>Amdox ERP</h2>
            </div>
            <div class="nav-user">
                <span id="nav-user-name" class="text-muted" style="font-size: var(--font-sm);"></span>
                <div id="nav-avatar" class="nav-avatar"></div>
                <button id="logout-btn" class="btn-logout" aria-label="Sign out">Sign Out</button>
            </div>
        </nav>

        
        <div class="dashboard-content">
            
            <div class="welcome-banner">
                <h1 id="welcome-text">Welcome to Amdox ERP</h1>
                <p>Your AI-Powered Enterprise Resource Planning Suite</p>
            </div>

            
            <div style="margin-bottom: var(--space-2xl);">
                <h2 style="font-size: var(--font-xl); margin-bottom: var(--space-lg); color: var(--text-secondary); font-weight: 500;">Your Profile</h2>
                <div class="module-card" style="cursor: default;">
                    <div style="display: grid; grid-template-columns: auto 1fr; gap: var(--space-md) var(--space-xl);">
                        <span style="color: var(--text-muted);">Name:</span>
                        <span id="profile-name" style="font-weight: 500;"></span>
                        <span style="color: var(--text-muted);">Email:</span>
                        <span id="profile-email" style="font-weight: 500;"></span>
                        <span style="color: var(--text-muted);">Phone:</span>
                        <span id="profile-phone" style="font-weight: 500;"></span>
                        <span style="color: var(--text-muted);">Auth Method:</span>
                        <span id="profile-provider" style="font-weight: 500;"></span>
                        <span style="color: var(--text-muted);">Role:</span>
                        <span id="profile-role" style="font-weight: 500;"></span>
                    </div>
                </div>
            </div>

            
            <h2 style="font-size: var(--font-xl); margin-bottom: var(--space-lg); color: var(--text-secondary); font-weight: 500;">ERP Modules</h2>
            <div id="modules-grid" class="modules-grid">
                
            </div>
        </div>
    </div>

    
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {

            if (!requireAuth()) return;

            const user = getStoredUser();

            if (user) {
                document.getElementById('welcome-text').textContent = `Welcome, ${user.full_name || 'User'}! 👋`;
                document.getElementById('nav-user-name').textContent = user.full_name || user.email;
                document.getElementById('profile-name').textContent = user.full_name || '—';
                document.getElementById('profile-email').textContent = user.email || '—';
                document.getElementById('profile-phone').textContent = user.phone || '—';
                document.getElementById('profile-provider').textContent = (user.provider || 'local').charAt(0).toUpperCase() + (user.provider || 'local').slice(1);
                document.getElementById('profile-role').textContent = (user.role || 'viewer').replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase());

                const avatarEl = document.getElementById('nav-avatar');
                if (user.avatar_url) {
                    avatarEl.innerHTML = `<img src="${user.avatar_url}" alt="Avatar">`;
                } else {
                    avatarEl.textContent = getUserInitials(user.full_name);
                }
            }

            try {
                const result = await AuthAPI.getDashboard();
                if (result.success && result.data.modules) {
                    const grid = document.getElementById('modules-grid');
                    grid.innerHTML = result.data.modules.map(mod => `
                        <a href="${mod.url}" class="module-card" aria-label="${mod.name} module" style="text-decoration: none; display: block;">
                            <div class="module-icon">${mod.icon}</div>
                            <h3>${mod.name}</h3>
                            <p>${mod.desc}</p>
                            <span class="module-status" style="color: var(--brand-secondary); background: rgba(0, 210, 255, 0.1); border-color: rgba(0, 210, 255, 0.2);">Active Module</span>
                        </a>
                    `).join('');
                }
            } catch (err) {
                console.error('Failed to load dashboard:', err);
            }

            document.getElementById('logout-btn').addEventListener('click', async () => {
                await AuthAPI.logout();
                showToast('Signed out successfully');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 500);
            });
        });
    </script>
</body>
</html>
