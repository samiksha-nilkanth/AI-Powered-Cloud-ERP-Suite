<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amdox ERP Suite - Enterprise AI-Powered Resource Planning Platform. Login to access your dashboard.">
    <title>Login | Amdox ERP Suite</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%236C5CE7'/><text x='50' y='68' font-size='50' font-weight='bold' text-anchor='middle' fill='white'>A</text></svg>">
</head>
<body>
    <main class="auth-page" id="login-page">
        <div class="auth-container">
            <div class="auth-card">
                
                <div class="auth-logo">
                    <div class="logo-icon" aria-hidden="true">A</div>
                    <h1>Welcome Back</h1>
                    <p>Sign in to your Amdox ERP account</p>
                </div>

                
                <div id="login-alert" class="alert" role="alert"></div>

                
                <div class="social-auth">
                    <button type="button" id="google-login-btn" class="btn btn-google" aria-label="Sign in with Google">
                        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        <span class="btn-text">Continue with Google</span>
                    </button>

                    <button type="button" id="phone-login-btn" class="btn btn-phone" aria-label="Sign in with Phone">
                        <span>📱</span>
                        <span class="btn-text">Continue with Phone</span>
                    </button>
                </div>

                <div class="divider" role="separator">or sign in with email</div>

                
                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input 
                            type="email" 
                            id="login-email" 
                            class="form-input" 
                            placeholder="you@company.com"
                            autocomplete="email"
                            required
                            aria-required="true"
                        >
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="login-password" 
                                class="form-input" 
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                required
                                aria-required="true"
                            >
                            <button type="button" id="password-toggle" class="password-toggle" aria-label="Toggle password visibility">👁️</button>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#" id="forgot-password-link">Forgot password?</a>
                    </div>

                    <button type="submit" id="login-btn" class="btn btn-primary">
                        <span class="btn-text">Sign In</span>
                    </button>
                </form>

                
                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html" id="goto-register">Create one</a></p>
                </div>
            </div>
        </div>

        
        <div id="phone-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Phone verification">
            <div class="modal">
                <button id="close-modal" class="modal-close" aria-label="Close">&times;</button>
                
                
                <div id="phone-step-1" class="phone-step">
                    <h2>📱 Phone Login</h2>
                    <p>We'll send a verification code to your phone number</p>
                    
                    <div id="phone-alert" class="alert" role="alert"></div>
                    
                    <div class="form-group">
                        <label for="phone-number">Phone Number</label>
                        <input 
                            type="tel" 
                            id="phone-number" 
                            class="form-input" 
                            placeholder="+91 98765 43210"
                            autocomplete="tel"
                        >
                    </div>
                    
                    <button type="button" id="send-otp-btn" class="btn btn-primary">
                        <span class="btn-text">Send Verification Code</span>
                    </button>
                </div>

                
                <div id="phone-step-2" class="phone-step">
                    <h2>🔐 Enter Verification Code</h2>
                    <p>Enter the 6-digit code sent to your phone</p>
                    
                    <div class="otp-inputs">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" aria-label="Digit 1">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" aria-label="Digit 2">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" aria-label="Digit 3">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" aria-label="Digit 4">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" aria-label="Digit 5">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" aria-label="Digit 6">
                    </div>
                    
                    <button type="button" id="verify-otp-btn" class="btn btn-primary">
                        <span class="btn-text">Verify & Sign In</span>
                    </button>
                    
                    <div class="otp-timer mt-md text-center">
                        <span id="otp-timer"></span>
                        <a id="resend-otp" href="#" style="display:none;">Resend code</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
