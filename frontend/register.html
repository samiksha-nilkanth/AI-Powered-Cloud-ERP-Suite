<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Amdox ERP Suite account. AI-Powered Enterprise Resource Planning Platform.">
    <title>Register | Amdox ERP Suite</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%236C5CE7'/><text x='50' y='68' font-size='50' font-weight='bold' text-anchor='middle' fill='white'>A</text></svg>">
</head>
<body>
    <main class="auth-page" id="register-page">
        <div class="auth-container">
            <div class="auth-card">
                
                <div class="auth-logo">
                    <div class="logo-icon" aria-hidden="true">A</div>
                    <h1>Create Account</h1>
                    <p>Get started with Amdox ERP Suite</p>
                </div>

                
                <div id="register-alert" class="alert" role="alert"></div>

                
                <div class="social-auth">
                    <button type="button" id="google-register-btn" class="btn btn-google" aria-label="Sign up with Google">
                        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        <span class="btn-text">Continue with Google</span>
                    </button>
                </div>

                <div class="divider" role="separator">or register with email</div>

                
                <form id="register-form" novalidate>
                    <div class="form-group">
                        <label for="register-name">Full Name <span style="color: var(--text-error);">*</span></label>
                        <input 
                            type="text" 
                            id="register-name" 
                            class="form-input" 
                            placeholder="John Doe"
                            autocomplete="name"
                            required
                            aria-required="true"
                        >
                    </div>

                    <div class="form-group">
                        <label for="register-email">Email Address <span style="color: var(--text-error);">*</span></label>
                        <input 
                            type="email" 
                            id="register-email" 
                            class="form-input" 
                            placeholder="you@company.com"
                            autocomplete="email"
                            required
                            aria-required="true"
                        >
                        <div id="email-error" class="field-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="register-phone">Phone Number <span style="color: var(--text-muted);">(optional)</span></label>
                        <input 
                            type="tel" 
                            id="register-phone" 
                            class="form-input" 
                            placeholder="+91 98765 43210"
                            autocomplete="tel"
                        >
                    </div>

                    <div class="form-group">
                        <label for="register-password">Password <span style="color: var(--text-error);">*</span></label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="register-password" 
                                class="form-input" 
                                placeholder="Min. 8 characters"
                                autocomplete="new-password"
                                required
                                aria-required="true"
                            >
                            <button type="button" id="password-toggle" class="password-toggle" aria-label="Toggle password visibility">👁️</button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div id="strength-fill" class="strength-fill"></div>
                            </div>
                            <span id="strength-text" class="strength-text"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="register-confirm-password">Confirm Password <span style="color: var(--text-error);">*</span></label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="register-confirm-password" 
                                class="form-input" 
                                placeholder="Re-enter your password"
                                autocomplete="new-password"
                                required
                                aria-required="true"
                            >
                            <button type="button" id="confirm-password-toggle" class="password-toggle" aria-label="Toggle confirm password visibility">👁️</button>
                        </div>
                        <div id="confirm-password-error" class="field-error"></div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms-checkbox" aria-required="true">
                        <label for="terms-checkbox">
                            I agree to the <a href="#" id="terms-link">Terms of Service</a> and <a href="#" id="privacy-link">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" id="register-btn" class="btn btn-primary">
                        <span class="btn-text">Create Account</span>
                    </button>
                </form>

                
                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html" id="goto-login">Sign in</a></p>
                </div>
            </div>
        </div>
    </main>

    
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
